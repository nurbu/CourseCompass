<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white/90 backdrop-blur-sm shadow-2xl rounded-3xl p-8 border border-gray-100">
      <div class="flex flex-col items-center mb-8">
        <app-logo size="medium" [showText]="true"></app-logo>
        <div class="text-center mt-4">
          <h1 class="text-2xl font-bold text-gray-800">Reset Password</h1>
          <p class="text-sm text-gray-500 mt-2">Enter your email and we'll send you a reset link</p>
        </div>
      </div>

      <!-- Success Message -->
      <div *ngIf="successMessage()" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-xl">
        <div class="flex items-center">
          <svg class="h-5 w-5 text-green-600 mr-2" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
          </svg>
          <span class="text-sm text-green-700 font-medium">{{ successMessage() }}</span>
        </div>
      </div>

      <form [formGroup]="form" (ngSubmit)="sendResetEmail()" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            class="w-full rounded-xl border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-gray-800 placeholder-gray-400 transition-all duration-200"
            placeholder="Enter your email address"
          />
          <div class="mt-1 text-sm text-red-600" *ngIf="form.controls.email.touched && form.controls.email.invalid">
            <span *ngIf="form.controls.email.errors?.['required']">Email is required.</span>
            <span *ngIf="form.controls.email.errors?.['email']">Enter a valid email.</span>
          </div>
        </div>

        <button type="submit" [disabled]="isLoading() || form.invalid" 
                class="w-full inline-flex items-center justify-center rounded-xl bg-gradient-to-r from-indigo-600 to-blue-600 px-4 py-3 text-white font-semibold hover:from-indigo-700 hover:to-blue-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 shadow-lg hover:shadow-xl">
          <svg *ngIf="isLoading()" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
          </svg>
          <svg *ngIf="!isLoading()" class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
          </svg>
          <span>{{ isLoading() ? 'Sending...' : 'Send Reset Link' }}</span>
        </button>
      </form>

      <div class="mt-8 text-center space-y-2">
        <p class="text-sm text-gray-600">
          Remember your password?
          <a routerLink="/login" class="text-indigo-600 hover:text-indigo-700 font-semibold transition-colors ml-1">Sign in</a>
        </p>
        <p class="text-sm text-gray-600">
          Don't have an account?
          <a routerLink="/register" class="text-indigo-600 hover:text-indigo-700 font-semibold transition-colors ml-1">Sign up</a>
        </p>
      </div>

      <p class="mt-4 text-center text-sm text-red-600 min-h-4" *ngIf="errorMessage()">{{ errorMessage() }}</p>
    </div>

    <p class="mt-6 text-center text-xs text-gray-500">
      Having trouble? Contact support for assistance.
    </p>
  </div>
</div>
