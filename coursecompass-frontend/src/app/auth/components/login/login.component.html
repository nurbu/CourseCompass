<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-indigo-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white/90 backdrop-blur-sm shadow-2xl rounded-3xl p-8 border border-gray-100">
      <div class="flex flex-col items-center mb-8">
        <app-logo size="medium" [showText]="true"></app-logo>
        <div class="text-center mt-4">
          <h1 class="text-2xl font-bold text-gray-800">Welcome Back</h1>
          <p class="text-sm text-gray-500 mt-1">Sign in to your CourseCompass account</p>
        </div>
      </div>

      <form [formGroup]="form" (ngSubmit)="signInWithEmailPassword()" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            class="w-full rounded-xl border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-gray-800 placeholder-gray-400 transition-all duration-200"
            placeholder="you@university.edu"
          />
          <div class="mt-1 text-sm text-red-600" *ngIf="form.controls.email.touched && form.controls.email.invalid">
            <span *ngIf="form.controls.email.errors?.['required']">Email is required.</span>
            <span *ngIf="form.controls.email.errors?.['email']">Enter a valid email.</span>
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              id="password"
              formControlName="password"
              autocomplete="current-password"
              class="w-full rounded-xl border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-gray-800 placeholder-gray-400 pr-12 transition-all duration-200"
              placeholder="••••••••"
            />
            <button type="button" (click)="togglePasswordVisibility()" 
                    class="absolute inset-y-0 right-0 px-3 text-gray-500 hover:text-gray-700 transition-colors">
              <span *ngIf="!showPassword(); else hide" class="text-xs">Show</span>
              <ng-template #hide><span class="text-xs">Hide</span></ng-template>
            </button>
          </div>
          <div class="mt-1 text-sm text-red-600" *ngIf="form.controls.password.touched && form.controls.password.invalid">
            <span *ngIf="form.controls.password.errors?.['required']">Password is required.</span>
            <span *ngIf="form.controls.password.errors?.['minlength']">Minimum 6 characters.</span>
          </div>
        </div>

        <div class="flex items-center justify-between pt-2">
          <label class="inline-flex items-center gap-2 text-sm text-gray-700">
            <input type="checkbox" formControlName="remember" 
                   class="rounded border-gray-300 text-indigo-600 focus:ring-2 focus:ring-indigo-500/20 transition-colors" />
            Remember me
          </label>
          <a routerLink="/forgot-password" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium transition-colors">
            Forgot password?
          </a>
        </div>

        <button type="submit" [disabled]="isLoading() || form.invalid" 
                class="w-full inline-flex items-center justify-center rounded-xl bg-gradient-to-r from-indigo-600 to-blue-600 px-4 py-3 text-white font-semibold hover:from-indigo-700 hover:to-blue-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 shadow-lg hover:shadow-xl">
          <svg *ngIf="isLoading()" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
          </svg>
          <span>Sign In</span>
        </button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
        <div class="relative flex justify-center text-sm"><span class="bg-white px-4 text-gray-500">or continue with</span></div>
      </div>

      <button (click)="signInWithGoogle()" [disabled]="isLoading()" 
              class="w-full inline-flex items-center justify-center gap-3 rounded-xl border-2 border-gray-200 bg-white px-4 py-3 text-gray-700 font-medium hover:bg-gray-50 hover:border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200">
        <img alt="Google" src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="h-5 w-5" />
        <span>Sign in with Google</span>
      </button>

      <p class="mt-6 text-center text-sm text-gray-600">
        New to CourseCompass?
        <a routerLink="/register" class="text-indigo-600 hover:text-indigo-700 font-semibold transition-colors ml-1">Create account</a>
      </p>

      <p class="mt-3 text-center text-sm text-red-600 min-h-4" *ngIf="errorMessage()">{{ errorMessage() }}</p>
    </div>
  </div>
</div>
